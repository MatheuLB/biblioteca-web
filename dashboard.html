<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>(function(){try{var t=localStorage.getItem("biblioteca-theme");document.documentElement.setAttribute("data-theme", t==="dark"?"dark":"light");}catch(e){}})();</script>
  <meta charset="UTF-8">
  <title>Minha Biblioteca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#1c2f4a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Biblioteca">
</head>
<body>
  <header class="app-header">
    <h1>📚 Minha Biblioteca</h1>
    <div class="header-actions">
      <button id="theme-toggle-btn" class="btn-link" title="Alternar tema" aria-label="Alternar tema claro/escuro">🌙</button>
      <button id="logout-btn" class="btn-link">Sair</button>
    </div>
  </header>

  <div class="container">
    <div class="stats-grid hidden" id="stats-grid"></div>

    <div class="toolbar">
      <h2>Fichas de leitura</h2>
      <div class="toolbar-actions">
        <button id="export-all-btn" class="btn-secondary hidden">⬇ Exportar estante (PDF)</button>
        <a href="ficha-form.html" class="btn-primary">+ Nova ficha</a>
      </div>
    </div>

    <div class="search-bar hidden" id="search-bar">
      <input type="search" id="search-input" placeholder="Buscar por nome da ficha, título ou autor... (atalho: /)">
      <div class="filters-row">
        <select id="filter-tema">
          <option value="">Todos os temas</option>
        </select>
        <select id="filter-avaliacao">
          <option value="">Todas as avaliações</option>
          <option value="5">★★★★★ (5)</option>
          <option value="4">★★★★☆ (4+)</option>
          <option value="3">★★★☆☆ (3+)</option>
          <option value="2">★★☆☆☆ (2+)</option>
          <option value="1">★☆☆☆☆ (1+)</option>
        </select>
      </div>
    </div>

    <div class="loading-state" id="loading-state">Carregando sua estante...</div>

    <div class="empty-state hidden" id="empty-state">
      <p>Sua estante ainda está vazia.</p>
      <p><a href="ficha-form.html" class="btn-primary" style="display:inline-block; margin-top:10px;">Criar primeira ficha</a></p>
    </div>

    <div class="empty-state hidden" id="no-results-state">
      <p>Nenhuma ficha encontrada para essa busca/filtro.</p>
    </div>

    <div class="fichas-grid hidden" id="fichas-grid"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="js/dashboard.js?v=6"></script>
</body>
</html>
