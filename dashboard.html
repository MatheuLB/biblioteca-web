<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minha Biblioteca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>📚 Minha Biblioteca</h1>
    <button id="logout-btn" class="btn-link">Sair</button>
  </header>

  <div class="container">
    <div class="toolbar">
      <h2>Fichas de leitura</h2>
      <a href="ficha-form.html" class="btn-primary">+ Nova ficha</a>
    </div>

    <div class="search-bar hidden" id="search-bar">
      <input type="search" id="search-input" placeholder="Buscar por nome da ficha, título ou autor...">
    </div>

    <div class="loading-state" id="loading-state">Carregando sua estante...</div>

    <div class="empty-state hidden" id="empty-state">
      <p>Sua estante ainda está vazia.</p>
      <p><a href="ficha-form.html" class="btn-primary" style="display:inline-block; margin-top:10px;">Criar primeira ficha</a></p>
    </div>

    <div class="empty-state hidden" id="no-results-state">
      <p>Nenhuma ficha encontrada para essa busca.</p>
    </div>

    <div class="fichas-grid hidden" id="fichas-grid"></div>
  </div>

  <script type="module" src="js/dashboard.js?v=4"></script>
</body>
</html>
