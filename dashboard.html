<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>(function(){try{var t=localStorage.getItem("biblioteca-theme");document.documentElement.setAttribute("data-theme", t==="light"?"light":"dark");}catch(e){}})();</script>
  <meta charset="UTF-8">
  <title>Minha Biblioteca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#1c2f4a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Biblioteca">
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-root"></div>

    <div class="main-content">
      <div class="topbar">
        <div class="welcome">
          <h1>Bem-vindo de volta!</h1>
          <p>Que tal registrar sua próxima aventura literária?</p>
        </div>
        <div class="topbar-actions">
          <button id="theme-toggle-btn" class="icon-btn-dark" title="Alternar tema" aria-label="Alternar tema claro/escuro">🌙</button>
          <a href="ficha-form.html" class="btn-purple">+ Nova ficha</a>
        </div>
      </div>

      <div class="welcome-banner">
        <div></div>
        <svg class="welcome-banner-illustration" viewBox="0 0 220 130" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="110" cy="123" rx="100" ry="6" fill="#000000" opacity="0.18"/>

          <g>
            <rect x="6" y="88" width="36" height="11" rx="2" fill="#c0622e"/>
            <rect x="10" y="76" width="32" height="11" rx="2" fill="#e0b84a"/>
            <rect x="7" y="64" width="34" height="11" rx="2" fill="#3f7a5c"/>
            <rect x="11" y="52" width="28" height="11" rx="2" fill="#2d4a7a"/>
          </g>

          <g>
            <ellipse cx="53" cy="119" rx="12" ry="5" fill="#3f4a3a"/>
            <rect x="46" y="102" width="14" height="16" rx="2" fill="#5a4231"/>
            <path d="M53 102 q-10 -14 -4 -26 M53 102 q2 -18 12 -24 M53 102 q10 -8 16 -18" stroke="#4f9a5c" stroke-width="4" fill="none" stroke-linecap="round"/>
          </g>

          <g>
            <circle cx="186" cy="70" r="24" fill="#f5d98c" opacity="0.22"/>
            <path d="M178 44 l8 -12 l8 12 Z" fill="#8b6df0"/>
            <line x1="186" y1="28" x2="186" y2="44" stroke="#8b6df0" stroke-width="2.5"/>
            <rect x="174" y="44" width="24" height="36" rx="4" fill="#e0b84a"/>
            <rect x="178" y="49" width="16" height="27" rx="2" fill="#fff3d6" opacity="0.85"/>
            <rect x="181" y="80" width="10" height="7" fill="#6d54d8"/>
          </g>

          <g>
            <ellipse cx="112" cy="123" rx="36" ry="7" fill="#6d54d8" opacity="0.25"/>
            <path d="M83 123 q-3 -32 29 -34 q32 2 29 34 Z" fill="#5b7fd4"/>
            <path d="M92 100 q20 11 40 0 l-4 15 q-16 8 -32 0 Z" fill="#e7ebf5"/>
            <circle cx="112" cy="68" r="17" fill="#f0c9a0"/>
            <path d="M95 64 q1 -18 17 -18 q17 0 17 18 q-5 -7 -17 -7 q-12 0 -17 7Z" fill="#3b2a1e"/>
          </g>
        </svg>
      </div>

      <div class="stat-cards-row" id="stat-cards-row"></div>

      <div class="section-card">
        <div class="section-card-header">
          <div>
            <h2><span class="icon-svg" style="width:18px;height:18px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.5c-1.5-1-4-1.5-6-1.5v13c2 0 4.5.5 6 1.5V6.5z"/><path d="M12 6.5c1.5-1 4-1.5 6-1.5v13c-2 0-4.5.5-6 1.5V6.5z"/></svg></span> Fichas de leitura</h2>
            <p>Seus registros e aventuras literárias</p>
          </div>
          <div class="toolbar-actions">
            <button id="export-all-btn" class="btn-outline-dark hidden">⬇ Exportar estante (PDF)</button>
            <a href="ficha-form.html" class="btn-purple">+ Nova ficha</a>
          </div>
        </div>

        <div class="search-bar hidden" id="search-bar">
          <input type="search" id="search-input" class="dark-input" placeholder="Buscar por nome da ficha, título ou autor... (atalho: /)">
          <div class="filters-row">
            <select id="filter-tema" class="dark-select">
              <option value="">Todos os temas</option>
            </select>
            <select id="filter-avaliacao" class="dark-select">
              <option value="">Todas as avaliações</option>
              <option value="5">★★★★★ (5)</option>
              <option value="4">★★★★☆ (4+)</option>
              <option value="3">★★★☆☆ (3+)</option>
              <option value="2">★★☆☆☆ (2+)</option>
              <option value="1">★☆☆☆☆ (1+)</option>
            </select>
          </div>
        </div>

        <div class="loading-state" id="loading-state">Carregando sua estante...</div>

        <div class="empty-state hidden" id="empty-state">
          <p>Sua estante ainda está vazia.</p>
          <p><a href="ficha-form.html" class="btn-purple" style="display:inline-block; margin-top:10px;">Criar primeira ficha</a></p>
        </div>

        <div class="empty-state hidden" id="no-results-state">
          <p>Nenhuma ficha encontrada para essa busca/filtro.</p>
        </div>

        <div class="fichas-grid hidden" id="fichas-grid"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="js/dashboard.js?v=9"></script>
</body>
</html>
