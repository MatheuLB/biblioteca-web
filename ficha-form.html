<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>(function(){try{var t=localStorage.getItem("biblioteca-theme");document.documentElement.setAttribute("data-theme", t==="light"?"light":"dark");}catch(e){}})();</script>
  <meta charset="UTF-8">
  <title>Ficha de leitura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#1c2f4a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Biblioteca">
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-content">
    <div class="topbar">
      <div class="welcome">
        <h1 id="form-title">Nova ficha de leitura</h1>
      </div>
      <div class="topbar-actions">
        <button id="theme-toggle-btn" class="icon-btn-dark" title="Alternar tema" aria-label="Alternar tema claro/escuro">🌙</button>
        <a href="dashboard.html" class="btn-outline-dark">Voltar</a>
      </div>
    </div>

    <div class="error-msg hidden" id="error-msg" style="margin-bottom:18px;"></div>

    <form class="ficha-form" id="ficha-form">
      <input type="hidden" id="ficha-id">

      <div class="form-group full">
        <label for="nome_ficha">Nome da ficha (como vai aparecer na sua estante) *</label>
        <input type="text" id="nome_ficha" required maxlength="120" placeholder="Ex: O Hobbit - releitura 2026">
      </div>

      <div class="form-group full">
        <label>Capa do livro</label>
        <div class="cover-upload">
          <img id="cover-preview" class="hidden" alt="Capa" crossorigin="anonymous">
          <input type="file" id="capa" accept="image/png,image/jpeg,image/webp">
          <span class="field-hint">PNG, JPG ou WEBP, até 8MB — você poderá ajustar o recorte antes de salvar</span>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="titulo">Título</label>
          <input type="text" id="titulo">
        </div>
        <div class="form-group">
          <label for="autor">Autor</label>
          <input type="text" id="autor">
        </div>
        <div class="form-group">
          <label for="editora">Editora</label>
          <input type="text" id="editora">
        </div>
        <div class="form-group">
          <label for="numero_paginas">Número de páginas</label>
          <input type="number" id="numero_paginas" min="0">
        </div>

        <div class="form-group">
          <label>Avaliação</label>
          <div class="star-input" id="star-input">
            <input type="radio" id="star5" name="avaliacao" value="5"><label for="star5">★</label>
            <input type="radio" id="star4" name="avaliacao" value="4"><label for="star4">★</label>
            <input type="radio" id="star3" name="avaliacao" value="3"><label for="star3">★</label>
            <input type="radio" id="star2" name="avaliacao" value="2"><label for="star2">★</label>
            <input type="radio" id="star1" name="avaliacao" value="1"><label for="star1">★</label>
          </div>
        </div>

        <div class="form-group">
          <label>Tipo de livro</label>
          <div class="radio-row">
            <label><input type="radio" name="tipo" value="fisico"> Físico</label>
            <label><input type="radio" name="tipo" value="digital"> Digital</label>
          </div>
        </div>

        <div class="form-group">
          <label for="inicio_leitura">Início da leitura</label>
          <input type="date" id="inicio_leitura">
        </div>
        <div class="form-group">
          <label for="termino_leitura">Término da leitura</label>
          <input type="date" id="termino_leitura">
        </div>
      </div>

      <div class="form-group full">
        <label>Temas abordados</label>
        <div class="checkbox-grid" id="temas-grid"></div>
      </div>

      <div class="form-group full">
        <label for="frase_favorita">Frase favorita</label>
        <textarea id="frase_favorita"></textarea>
      </div>

      <div class="form-group full">
        <label for="personagens">Personagens</label>
        <textarea id="personagens"></textarea>
      </div>

      <div class="form-group full">
        <label for="criticas">Críticas</label>
        <textarea id="criticas"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-purple" id="submit-btn">Criar ficha</button>
        <a href="dashboard.html" class="btn-outline-dark">Cancelar</a>
      </div>
    </form>
    </div>
  </div>

  <div class="crop-modal hidden" id="crop-modal">
    <div class="crop-modal-inner">
      <h3>Ajustar capa</h3>
      <p class="field-hint">Arraste a imagem para posicionar e use o controle para ajustar o zoom.</p>
      <div class="crop-viewport" id="crop-viewport">
        <img id="crop-image" draggable="false" alt="Capa a recortar">
      </div>
      <input type="range" id="crop-zoom" min="1" max="3" step="0.01" value="1">
      <div class="crop-modal-actions">
        <button type="button" id="crop-cancel-btn" class="btn-outline-dark">Cancelar</button>
        <button type="button" id="crop-confirm-btn" class="btn-purple">Usar esta capa</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/ficha-form.js?v=5"></script>
</body>
</html>
