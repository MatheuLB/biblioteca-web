<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Biblioteca Pessoal — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#1c2f4a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Biblioteca">
</head>
<body>
  <div class="login-page">
    <div class="shelf-row top" id="shelf-top"></div>
    <div class="shelf-row bottom" id="shelf-bottom"></div>

    <div class="login-card">
      <div class="crest">
        <svg viewBox="0 0 24 24"><path d="M4 4c2 0 4 1 6 3 2-2 4-3 6-3 1 0 2 .5 2 2v12c0 1.5-1 2-2 2-2 0-4 1-6 3-2-2-4-3-6-3-1 0-2-.5-2-2V6c0-1.5 1-2 2-2zm6 5v9"/></svg>
      </div>
      <h1>Biblioteca Pessoal</h1>
      <div class="subtitle">Fichas de leitura</div>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="tab-login">Entrar</button>
        <button type="button" class="auth-tab" id="tab-register">Criar conta</button>
      </div>

      <form class="login-form" id="login-form">
        <label for="login-email">E-mail</label>
        <input type="email" id="login-email" name="email" required autofocus autocomplete="email">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
        <button type="submit" class="btn-gold" id="login-btn">Entrar</button>
      </form>

      <form class="login-form hidden" id="register-form">
        <label for="register-email">E-mail</label>
        <input type="email" id="register-email" name="email" required autocomplete="email">
        <label for="register-password">Senha</label>
        <input type="password" id="register-password" name="password" required autocomplete="new-password">
        <label for="register-password-confirm">Confirmar senha</label>
        <input type="password" id="register-password-confirm" name="password-confirm" required autocomplete="new-password">
        <button type="submit" class="btn-gold" id="register-btn">Criar conta</button>
      </form>

      <div class="error-msg hidden" id="error-msg"></div>
      <div class="success-msg hidden" id="success-msg"></div>
    </div>
  </div>

  <script type="module" src="js/login.js?v=5"></script>
</body>
</html>
