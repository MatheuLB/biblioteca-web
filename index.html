<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Biblioteca Pessoal — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#1c2f4a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Biblioteca">
</head>
<body>
  <div class="login-page">
    <div class="shelf-row top" id="shelf-top"></div>
    <div class="shelf-row bottom" id="shelf-bottom"></div>

    <svg class="corner-deco corner-deco-left" viewBox="0 0 90 130" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="45" cy="122" rx="12" ry="5" fill="#241710" opacity="0.6"/>
      <rect x="38" y="106" width="14" height="16" rx="2" fill="#5a4231"/>
      <path d="M45 106 q-10 -14 -4 -26 M45 106 q2 -18 12 -24 M45 106 q10 -8 16 -18" stroke="#4f9a5c" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="18" cy="78" r="20" fill="#f5d98c" opacity="0.18"/>
      <path d="M10 52 l8 -12 l8 12 Z" fill="#b08d3f"/>
      <line x1="18" y1="36" x2="18" y2="52" stroke="#b08d3f" stroke-width="2.5"/>
      <rect x="6" y="52" width="24" height="36" rx="4" fill="#d9bc73"/>
      <rect x="10" y="57" width="16" height="27" rx="2" fill="#fff3d6" opacity="0.85"/>
      <rect x="13" y="88" width="10" height="7" fill="#3e2c20"/>
    </svg>
    <svg class="corner-deco corner-deco-right" viewBox="0 0 90 130" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="45" cy="122" rx="14" ry="5" fill="#241710" opacity="0.6"/>
      <rect x="14" y="100" width="16" height="22" rx="2" fill="#c0622e"/>
      <rect x="30" y="90" width="16" height="22" rx="2" fill="#3f7a5c"/>
      <rect x="46" y="80" width="16" height="22" rx="2" fill="#2d4a7a"/>
      <path d="M18 100 q22 8 44 -2 l-3 12 q-19 8 -38 2 Z" fill="#e7ebf5"/>
    </svg>

    <div class="login-card">
      <div class="crest">
        <svg viewBox="0 0 24 24"><path d="M4 4c2 0 4 1 6 3 2-2 4-3 6-3 1 0 2 .5 2 2v12c0 1.5-1 2-2 2-2 0-4 1-6 3-2-2-4-3-6-3-1 0-2-.5-2-2V6c0-1.5 1-2 2-2zm6 5v9"/></svg>
      </div>
      <h1>Biblioteca Pessoal</h1>
      <div class="subtitle">✦ Fichas de leitura ✦</div>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="tab-login">Entrar</button>
        <button type="button" class="auth-tab" id="tab-register">Criar conta</button>
      </div>

      <form class="login-form" id="login-form">
        <label for="login-email">E-mail</label>
        <input type="email" id="login-email" name="email" required autofocus autocomplete="email" placeholder="Digite seu e-mail">
        <label for="password">Senha de acesso</label>
        <div class="input-with-icon">
          <svg viewBox="0 0 24 24" class="input-icon"><path d="M6 10V8a6 6 0 1112 0v2h1a1 1 0 011 1v9a2 2 0 01-2 2H6a2 2 0 01-2-2v-9a1 1 0 011-1h1zm2 0h8V8a4 4 0 10-8 0v2zm4 4a1.5 1.5 0 00-1 2.6V18h2v-1.4a1.5 1.5 0 00-1-2.6z"/></svg>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Digite sua senha">
        </div>
        <button type="submit" class="btn-gold" id="login-btn"><span class="sparkle">✦</span> Entrar <span class="sparkle">✦</span></button>
      </form>

      <form class="login-form hidden" id="register-form">
        <label for="register-email">E-mail</label>
        <input type="email" id="register-email" name="email" required autocomplete="email" placeholder="Digite seu e-mail">
        <label for="register-password">Senha</label>
        <div class="input-with-icon">
          <svg viewBox="0 0 24 24" class="input-icon"><path d="M6 10V8a6 6 0 1112 0v2h1a1 1 0 011 1v9a2 2 0 01-2 2H6a2 2 0 01-2-2v-9a1 1 0 011-1h1zm2 0h8V8a4 4 0 10-8 0v2zm4 4a1.5 1.5 0 00-1 2.6V18h2v-1.4a1.5 1.5 0 00-1-2.6z"/></svg>
          <input type="password" id="register-password" name="password" required autocomplete="new-password" placeholder="Crie uma senha">
        </div>
        <label for="register-password-confirm">Confirmar senha</label>
        <div class="input-with-icon">
          <svg viewBox="0 0 24 24" class="input-icon"><path d="M6 10V8a6 6 0 1112 0v2h1a1 1 0 011 1v9a2 2 0 01-2 2H6a2 2 0 01-2-2v-9a1 1 0 011-1h1zm2 0h8V8a4 4 0 10-8 0v2zm4 4a1.5 1.5 0 00-1 2.6V18h2v-1.4a1.5 1.5 0 00-1-2.6z"/></svg>
          <input type="password" id="register-password-confirm" name="password-confirm" required autocomplete="new-password" placeholder="Repita a senha">
        </div>
        <button type="submit" class="btn-gold" id="register-btn"><span class="sparkle">✦</span> Criar conta <span class="sparkle">✦</span></button>
      </form>

      <div class="error-msg hidden" id="error-msg"></div>
      <div class="success-msg hidden" id="success-msg"></div>
    </div>
  </div>

  <script type="module" src="js/login.js?v=5"></script>
</body>
</html>
